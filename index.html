<title>매매손익</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#2a323d;
    --txt:#e6edf3; --dim:#8b98a5; --dim2:#5b6672;
    --up:#ff5b5b; --up-bg:#3a1a1c;
    --down:#4d9bff; --down-bg:#152538;
    --accent:#e8b64a;
  }
  body.light{
    --bg:#f4f6f9; --panel:#ffffff; --panel2:#eef1f5; --line:#d8dde3;
    --txt:#1a1f26; --dim:#5f6b78; --dim2:#98a2ad;
    --up:#e23b3b; --up-bg:#fdeaea;
    --down:#2f6fe0; --down-bg:#e7f0fd;
    --accent:#b9891f;
  }
  body.light .cell.hasmemo{border-color:rgba(0,0,0,.42); box-shadow:0 0 6px rgba(0,0,0,.08);}
  body.light .cell.hasmemo .memo{color:#111; text-shadow:none;}
  body.light .cell.today{box-shadow:0 0 7px rgba(185,137,31,.28);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Segoe UI",sans-serif;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overscroll-behavior:none; user-select:none; -webkit-user-select:none;
  }
  .num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum";}

  header{padding:16px 16px 10px; text-align:center; position:relative;}
  .brand{font-size:12px; letter-spacing:3px; color:var(--dim2); font-weight:600;}
  .tabs{display:flex; gap:6px; margin-top:12px; background:var(--panel); padding:4px; border-radius:12px;}
  .tab{flex:1; text-align:center; padding:9px 0; border-radius:9px; font-size:14px; font-weight:600; color:var(--dim); cursor:pointer;}
  .tab.on{background:var(--panel2); color:var(--txt); box-shadow:0 1px 0 rgba(255,255,255,.03) inset;}

  .navbar{display:flex; align-items:center; justify-content:space-between; padding:6px 16px 2px;}
  .navbar button{background:var(--panel); border:1px solid var(--line); color:var(--txt); width:40px; height:40px; border-radius:11px; font-size:20px; cursor:pointer;}
  .navbar button:active{background:var(--panel2);}
  .ymlabel{font-size:19px; font-weight:700; letter-spacing:.5px;}
  .ymlabel .y{color:var(--dim);}

  .msum{margin:8px 16px 4px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; -webkit-user-select:none;}
  .msum:active{background:var(--panel2);}
  .msum .lb{font-size:12px; color:var(--dim);}
  .msum .val{font-size:24px; font-weight:800; letter-spacing:.3px;}
  .msum .sub{font-size:11px; color:var(--dim2); margin-top:2px;}

  .dow{display:grid; grid-template-columns:repeat(7,1fr); padding:8px 10px 2px; gap:4px;}
  .dow span{text-align:center; font-size:11px; color:var(--dim2);}
  .dow span.sun{color:var(--up);} .dow span.sat{color:#69c;}

  .grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; padding:0 10px 12px;}
  .cell{min-height:70px; background:var(--panel); border:1px solid transparent; border-radius:10px; padding:5px 4px 4px; cursor:pointer; display:flex; flex-direction:column; overflow:hidden;}
  .cell.empty{background:transparent; cursor:default;}
  .cell:active:not(.empty){border-color:var(--accent);}
  .cell.hasmemo{border-color:rgba(255,255,255,.5); box-shadow:0 0 7px rgba(255,255,255,.14);}
  .cell.hasmemo .memo{color:#fff; text-shadow:0 0 7px rgba(255,255,255,.55);}
  .cell.today{border-color:var(--accent); box-shadow:0 0 7px rgba(232,182,74,.25);}
  .cell .d{font-size:12px; color:var(--dim); line-height:1;}

    if(child&&buddha&&buddha.getMonth()===dO.getMonth()&&buddha.getDate()===dO.getDate())trig=true;
    if(trig){var s=nextSub(dO);add(s.getMonth()+1,s.getDate(),"대체");}
  });
  return H;
}

function eventsFor(y,mo,d){

function dateKey(y,m,d){return y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
function parseAmount(str){
  if(str==null)return NaN;
  var c=String(str).replace(/,/g,"").replace(/\s/g,"").replace(/원/g,"").trim();
  if(c==="")return NaN;
  if(!/^\d+(\.\d+)?$/.test(c))return NaN;
  return parseFloat(c);
}
function fmt(n){var s=Math.abs(n).toLocaleString("ko-KR",{maximumFractionDigits:8});return (n>0?"+":n<0?"-":"")+s;}
function fmtShort(n){
  var a=Math.abs(n), sign=n>0?"+":n<0?"-":"";
  if(a<10000) return sign + a.toLocaleString("ko-KR",{maximumFractionDigits:2});
  function cut(v){return v<100 ? (Math.floor(v*10)/10).toString() : Math.floor(v).toString();}
  if(a<100000000) return sign + cut(a/10000) + "만";
  return sign + cut(a/100000000) + "억";
}
function el(id){return document.getElementById(id);}
function escapeHtml(s){return s.replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}

function renderCal(){

/* ===== 연간 누적 손익 그래프 ===== */
function renderYearChart(){
  var host=el("yChart");
  var keys=[]; for(var k in data)if(k.indexOf(curYear+"-")===0)keys.push(k);
  if(!keys.length){host.innerHTML='<div class="nochart">내역 없음</div>';return;}
  keys.sort();
  var pts=[{doy:0,cum:0}], run=0, i, p;
  for(i=0;i<keys.length;i++){p=keys[i].split("-");run+=data[keys[i]].amount;pts.push({doy:(Date.UTC(+p[0],+p[1]-1,+p[2])-Date.UTC(+p[0],0,1))/86400000,cum:run});}
  var leap=((curYear%4===0&&curYear%100!==0)||curYear%400===0), td=leap?366:365;
  var mn=0,mx=0; for(i=0;i<pts.length;i++){if(pts[i].cum<mn)mn=pts[i].cum;if(pts[i].cum>mx)mx=pts[i].cum;}
  var W=320,H=170,padL=8,padR=8,padT=14,padB=18;
  var x0=padL,x1=W-padR,yt=padT,yb=H-padB;
  function X(doy){return x0+(doy/(td-1))*(x1-x0);}
  function Y(v){return (mx===mn)?(yt+yb)/2:yt+(mx-v)/(mx-mn)*(yb-yt);}
  var zeroY=Y(0);
  var line="";
  for(i=0;i<pts.length;i++){line+=(i?" L":"M")+X(pts[i].doy).toFixed(1)+" "+Y(pts[i].cum).toFixed(1);}
  var fx=X(pts[0].doy).toFixed(1), lx=X(pts[pts.length-1].doy).toFixed(1);
  var area="M"+fx+" "+zeroY.toFixed(1)+" "+line.replace(/^M/,"L")+" L"+lx+" "+zeroY.toFixed(1)+" Z";
  var col=run>=0?"var(--up)":"var(--down)";
  var grid="";
  for(var mo=1;mo<12;mo++){var gx=X((Date.UTC(curYear,mo,1)-Date.UTC(curYear,0,1))/86400000).toFixed(1);grid+='<line x1="'+gx+'" y1="'+yt+'" x2="'+gx+'" y2="'+yb+'" stroke="var(--line)" stroke-width="1"/>';}
  var last=pts[pts.length-1];
  var mid=(Date.UTC(curYear,6,1)-Date.UTC(curYear,0,1))/86400000;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" preserveAspectRatio="xMidYMid meet">'
    +grid
    +'<line x1="'+x0+'" y1="'+zeroY.toFixed(1)+'" x2="'+x1+'" y2="'+zeroY.toFixed(1)+'" stroke="var(--dim2)" stroke-width="1" stroke-dasharray="3 3"/>'
    +'<path d="'+area+'" fill="'+col+'" opacity="0.13"/>'
    +'<path d="'+line+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
    +'<circle cx="'+X(last.doy).toFixed(1)+'" cy="'+Y(last.cum).toFixed(1)+'" r="3" fill="'+col+'"/>'
    +'<text x="'+x0+'" y="'+(H-6)+'" fill="var(--dim2)" font-size="8">1월</text>'
    +'<text x="'+X(mid).toFixed(1)+'" y="'+(H-6)+'" fill="var(--dim2)" font-size="8" text-anchor="middle">7월</text>'
    +'<text x="'+x1+'" y="'+(H-6)+'" fill="var(--dim2)" font-size="8" text-anchor="end">12월</text>'
    +'</svg>';
  host.innerHTML=svg;
}

function doSave(){

/* ===== 알림(.ics) : 전날 18시 KST = 전날 09:00 UTC ===== */
function pad2(n){return String(n).padStart(2,"0");}
function utcStamp(dt){return dt.getUTCFullYear()+pad2(dt.getUTCMonth()+1)+pad2(dt.getUTCDate())+"T"+pad2(dt.getUTCHours())+pad2(dt.getUTCMinutes())+"00Z";}
function icsEsc(s){return String(s).replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");}
function addAlarm(){
  if(!selKey)return;
  var memo=el("memoInput").value.trim()||"매매 일정";
  var p=selKey.split("-"), y=+p[0], m=+p[1], d=+p[2];
  var startYMD=p[0]+p[1]+p[2];
  var endD=new Date(y,m-1,d+1);
  var endYMD=endD.getFullYear()+pad2(endD.getMonth()+1)+pad2(endD.getDate());
  var prev=new Date(Date.UTC(y,m-1,d)); prev.setUTCDate(prev.getUTCDate()-1); prev.setUTCHours(9,0,0,0);
  var trig=utcStamp(prev);
  var stamp=utcStamp(new Date());
  var uid="tm"+startYMD+"-"+Date.now()+"@tradememo";
  var ics=[
    "BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//tradememo//KR//","CALSCALE:GREGORIAN","METHOD:PUBLISH",
    "BEGIN:VEVENT","UID:"+uid,"DTSTAMP:"+stamp,
    "DTSTART;VALUE=DATE:"+startYMD,"DTEND;VALUE=DATE:"+endYMD,
    "SUMMARY:"+icsEsc(memo),
    "BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(memo),
    "TRIGGER;VALUE=DATE-TIME:"+trig,"END:VALARM",
    "END:VEVENT","END:VCALENDAR"
  ].join("\r\n");
  var blob=new Blob([ics],{type:"text/calendar;charset=utf-8"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url; a.download="알림_"+startYMD+".ics";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){URL.revokeObjectURL(url);},1500);
  toast("캘린더 앱에서 '추가'를 눌러주세요");
}

function mergePnl(obj){
  var n=0;
  for(var k in obj){
    if(/^\d{4}-\d{2}-\d{2}$/.test(k)&&obj[k]&&typeof obj[k].amount==="number"){
      data[k]={amount:obj[k].amount,memo:(obj[k].memo||"")+""}; n++;
    }
  }
  return n;
}
function mergeEvents(arr){
  if(!Array.isArray(arr))return 0;
  var n=0;
  arr.forEach(function(e){
    if(e&&typeof e.name==="string"&&(e.type==="solar"||e.type==="lunar")&&e.mo>=1&&e.mo<=12&&e.day>=1&&e.day<=31){
      var dup=events.some(function(x){return x.name===e.name&&x.type===e.type&&x.mo===e.mo&&x.day===e.day;});
      if(!dup){events.push({name:e.name,type:e.type,mo:e.mo,day:e.day}); n++;}
    }
  });
  return n;
}
function importData(file){
  var fr=new FileReader();
  fr.onload=function(){
    try{
      var obj=JSON.parse(fr.result);
      if(typeof obj!=="object"||obj===null||Array.isArray(obj))throw 0;
      var pnlN=0, evN=0;
      if(obj.data&&typeof obj.data==="object"&&!Array.isArray(obj.data)){ // 신형 {data,events}
        pnlN=mergePnl(obj.data); evN=mergeEvents(obj.events);
      }else{ // 구형: 평면 손익객체
        pnlN=mergePnl(obj);
      }
      if(pnlN===0&&evN===0)throw 0;
      saveData(); saveEvents(); renderCal(); if(el("yearView").style.display!=="none")renderYear();
      toast("손익 "+pnlN+"건"+(evN?" · 기념일 "+evN+"건":"")+" 불러옴");
    }catch(e){toast("올바른 백업 파일이 아닙니다");}
  };
  fr.readAsText(file);
}

/* ===== 이벤트 ===== */
el("prevM").onclick=function(){view=new Date(view.getFullYear(),view.getMonth()-1,1);renderCal();};
el("nextM").onclick=function(){view=new Date(view.getFullYear(),view.getMonth()+1,1);renderCal();};
el("prevY").onclick=function(){curYear--;renderYear();};
el("nextY").onclick=function(){curYear++;renderYear();};
el("tabCal").onclick=function(){switchTab("cal");};
el("tabYear").onclick=function(){switchTab("year");};
el("signPlus").onclick=function(){setSign(1);};
el("signMinus").onclick=function(){setSign(-1);};
el("btnSave").onclick=doSave;
el("btnDelete").onclick=doDelete;
el("btnCancel").onclick=closeSheet;
el("btnAlarm").onclick=addAlarm;
el("backdrop").onclick=function(){closeSheet();closeEvents();closeSettings();};
el("btnSettings").onclick=openSettings;
el("setDark").onclick=function(){applyTheme("dark");};
el("setLight").onclick=function(){applyTheme("light");};
el("setClose").onclick=closeSettings;
el("btnEvents").onclick=openEvents;
el("evSolar").onclick=function(){setEvType("solar");};
el("evLunar").onclick=function(){setEvType("lunar");};
el("evAdd").onclick=addEvent;
el("evClose").onclick=closeEvents;
el("amtInput").addEventListener("input",function(){el("warn").textContent="";});
el("amtInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSave();});
el("btnExport").onclick=exportData;
el("btnImportTrig").onclick=function(){el("fileImport").click();};
el("fileImport").onchange=function(e){if(e.target.files[0])importData(e.target.files[0]);this.value="";};

// 이번달 손익 프라이버시 토글(탭하면 금액 표시/숨김)
el("msum").onclick=function(){showAmount=!showAmount;renderCal();};

// 달력 좌우 스와이프로 이전/다음 달
(function(){
  var x0=null,y0=null;
  var cv=el("calView");
  cv.addEventListener("touchstart",function(e){var t=e.changedTouches[0];x0=t.clientX;y0=t.clientY;},{passive:true});
  cv.addEventListener("touchend",function(e){
    if(x0===null)return;
    var t=e.changedTouches[0], dx=t.clientX-x0, dy=t.clientY-y0;
    x0=null;
    if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.5){
      view=new Date(view.getFullYear(),view.getMonth()+(dx<0?1:-1),1);
      renderCal();
    }
  },{passive:true});
})();

applyTheme(theme);
renderCal();
</script>
</body>
</html>
